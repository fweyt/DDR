services:
  ai-service:
    build:
      context: ..
      dockerfile: container/Dockerfile
    container_name: ai-hulpservice
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ../messages.db:/app/messages.db
      - ../config.json:/app/config.json
      - ../prompts:/app/prompts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-rest-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../signals:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE=true
